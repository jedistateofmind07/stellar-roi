<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5ecd6">
<title>Poses — Angelica's Yoga</title>
<link rel="icon" type="image/svg+xml" href="public/favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-poses">
<header class="topbar">
  <a href="index.html" class="brand">
    <img src="public/logo.svg" alt="" class="brand-mark">
    <span class="brand-text">Angelica's Yoga</span>
  </a>
  <nav class="topnav">
    <a href="poses.html" class="active">Poses</a>
    <a href="routines.html">Routines</a>
  </nav>
</header>

<main class="container">
  <h1 class="page-title">Poses</h1>
  <p class="page-sub" id="pose-count">Loading poses…</p>

  <div class="filters">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7" fill="none" stroke-width="2"/>
        <path d="M20 20l-4-4" fill="none" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="search" id="search" placeholder="Search by English or Sanskrit name…" autocomplete="off">
    </div>

    <div class="chips" id="difficulty-chips" aria-label="Filter by difficulty">
      <span class="chips-label">Difficulty:</span>
      <button class="chip" data-difficulty="Beginner">Beginner</button>
      <button class="chip" data-difficulty="Intermediate">Intermediate</button>
      <button class="chip" data-difficulty="Advanced">Advanced</button>
    </div>

    <div class="chips chips-scroll" id="category-chips" aria-label="Filter by category">
      <span class="chips-label">Category:</span>
    </div>
  </div>

  <div class="pose-grid" id="pose-grid" role="list"></div>
  <div class="empty-state" id="empty-state" hidden>
    <p>No poses match your filters.</p>
    <button class="btn-ghost" id="clear-filters">Clear filters</button>
  </div>
</main>

<footer class="site-footer">
  <p>Made with care for Angelica</p>
</footer>

<script src="js/app.js"></script>
<script src="js/poses.js"></script>
</body>
</html>
